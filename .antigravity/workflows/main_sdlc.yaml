name: "KMP IoT — FDA-Aligned SDLC Workflow"
standard: "IEC 62304-inspired / FDA 21 CFR 820.30"

on:
  task_start:
    - action: "spawn_agent"
      rule: "orchestrator.md"

steps:
  # ── PHASE 0: Initialize ──────────────────────────────────────────────────
  - name: "Workflow Init"
    description: "Init context file và khởi tạo workflow state"
    agent: "orchestrator.md"
    commands:
      - "python .claude/skills/kmp-tools/scripts/context_manager.py init <feature> '<description>'"
    outputs:
      - ".claude/context/00_workflow.json"

  # ── PHASE 1: Architecture & Design (IEC 62304 §5.3-5.4) ─────────────────
  - name: "Architecture & Design"
    description: "Thiết kế kiến trúc, tạo SRS addendum và SDD draft"
    agent: "kmp-architect"
    fda_outputs:
      - "01_architect.json (_fda.soups_introduced, _fda.risks, _fda.adrs_created)"
      - "docs/SRS/SRS-NNN_<feature>.md [DRAFT]"
      - "docs/SDD/SDD-NNN_<feature>.md [DRAFT]"
    commands:
      - "python .claude/skills/kmp-tools/scripts/doc_generator.py --srs --sdd"

  # ── PHASE 2: Implementation (IEC 62304 §5.5) ────────────────────────────
  - name: "Implementation"
    description: "Viết code theo thiết kế, cập nhật _fda.requirements_implemented"
    agents:
      - "kmp-shared"      # → 02_shared.json
      - "kmp-iot"         # → 03_iot.json
      - "kmp-ktor-backend" # → 04_ktor.json
      - "kmp-compose"     # → 05_compose.json
    mode: "parallel_then_sync"
    fda_rule: "Mỗi agent PHẢI điền _fda.requirements_implemented[] với các REQ-ID từ SRS-001"

  # ── PHASE 3: Dual Code Review (FDA §5.5 + Reviewer gates) ───────────────
  - name: "Dual Code Review"
    description: "Logic review (safety, concurrency, IoT) + Style review"
    agents: ["reviewer_logic.md", "reviewer_style.md"]
    loop_until: "both_approved"
    fda_gate: true
    fda_rule: "reviewer_logic PHẢI check FDA items: no GlobalScope, no hardcoded secrets, MQTT validation"

  # ── PHASE 4: Verification & Validation (IEC 62304 §5.6-5.7) ─────────────
  - name: "Verification & Validation"
    description: "Chạy tests, tạo VVR, verify risks"
    agents:
      - "kmp-qa"          # → 07_qa.json (_fda.tests[], _fda.vvr_ref)
      - "kmp-security"    # → 08_security.json (_fda.risks_reviewed)
    commands:
      - "./gradlew allTests"
      - "python .claude/skills/kmp-tools/scripts/doc_generator.py --vvr --risk --tm"
    fda_gate: true
    gate_condition: "07_qa.json.outputs.all_tests_pass == true AND 08_security.json.outputs.critical_issues == []"

  # ── PHASE 5: DevOps (IEC 62304 §5.8) ────────────────────────────────────
  - name: "DevOps & CI"
    description: "CI/CD pipeline check, Docker build"
    agent: "kmp-devops"  # → 06_devops.json
    commands:
      - "./gradlew check"

  # ── PHASE 6: FDA Documentation (IEC 62304 §5.1-5.8) ─────────────────────
  - name: "FDA Documentation"
    description: "Generate & commit tất cả FDA documents (MANDATORY)"
    agent: "orchestrator.md"
    mandatory: true
    commands:
      - "python .claude/skills/kmp-tools/scripts/doc_generator.py --soup --cm --all"
      - "git add docs/ CHANGELOG.md"
      - "git commit -m 'docs(<feature>): FDA documentation package [IEC-62304]'"
    fda_outputs:
      - "docs/SRS/SRS-NNN_<feature>.md [APPROVED]"
      - "docs/SDD/SDD-NNN_<feature>.md [APPROVED]"
      - "docs/VVR/VVR-NNN_<feature>_results.md"
      - "docs/TM/TM-001_traceability.md [UPDATED]"
      - "docs/RM/RM-001_risk-analysis.md [UPDATED]"
      - "docs/SOUP/SOUP-001_ots-inventory.md [UPDATED]"
      - "docs/CM/CM-001_change-log.md [UPDATED]"

  # ── PHASE 7: Git & Release ────────────────────────────────────────────────
  - name: "Git Operations"
    agent: "git_shipper.md"
    commands:
      - "git add -A"
      - "git commit -m 'feat(<feature>): <description>'"

# ── FDA Gates (abort conditions) ──────────────────────────────────────────
fda_abort_conditions:
  - "07_qa.json.outputs.all_tests_pass == false → STOP: Fix tests before release"
  - "08_security.json.outputs.critical_issues != [] → STOP: Resolve critical security issues"
  - "01_architect._fda.risks[] has Critical + no control → WARN: Must document mitigation"

# ── Document Control ─────────────────────────────────────────────────────
document_control:
  standards: ["IEC 62304", "FDA 21 CFR 820.30"]
  doc_root: "docs/"
  traceability_matrix: "docs/TM/TM-001_traceability.md"
  risk_register: "docs/RM/RM-001_risk-analysis.md"
  soup_inventory: "docs/SOUP/SOUP-001_ots-inventory.md"
  change_log: "docs/CM/CM-001_change-log.md"
